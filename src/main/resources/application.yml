spring:
  application:
    name: garvey_ai_code_backend
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/garvey_ai_code
    username: root
    password: root
  profiles:
    active: local
server:
  port: 8081
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.garvey.garveyaicode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn




